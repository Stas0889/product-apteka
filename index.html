<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./product-apteka/" />
    <title>Urban Queen материалы</title>
    <link rel="icon" href="./product-apteka/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        --milk: #fbf7ef;
        --green: #05531d;
        --teal: #07777b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100svh;
        margin: 0;
        place-items: center;
        color: var(--green);
        background: radial-gradient(circle at 20% 20%, rgba(7, 119, 123, 0.14), transparent 28rem), var(--milk);
        font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      }

      main {
        width: min(520px, calc(100% - 32px));
        padding: 32px;
        border: 1px solid rgba(5, 83, 29, 0.14);
        border-radius: 24px;
        background: rgba(255, 253, 248, 0.82);
        box-shadow: 0 24px 70px rgba(45, 67, 38, 0.14);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(30px, 7vw, 46px);
        line-height: 1;
      }

      p {
        margin: 0 0 20px;
        color: #64705f;
        font-size: 17px;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 13px 18px;
        border-radius: 999px;
        color: #fffdf8;
        background: var(--teal);
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Urban Queen</h1>
      <p>Переходим к материалу «Продуктовая аптечка».</p>
      <a href="./product-apteka/">Открыть материал</a>
    </main>
  </body>
</html>
